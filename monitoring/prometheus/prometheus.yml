global:
  scrape_interval: 15s

scrape_configs:
  - job_name: hotel-management-system
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - service-discovery:8761
          - config-server:8888
          - api-gateway:8080
          - hotel-service:8081
          - booking-service:8082
          - payment-service:8083
          - user-service:8084
          - notification-service:8085
          - inventory-service:8086

