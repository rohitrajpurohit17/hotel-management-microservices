server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: hotel-management
    static_configs:
      - targets:
          - localhost
        labels:
          job: hotel-management
          __path__: /var/log/apps/*.log

