      # This tells notification-service which RabbitMQ username to use.
      RABBITMQ_USERNAME: hotelmq
      # This tells notification-service which RabbitMQ password to use.
      RABBITMQ_PASSWORD: hotelmq123
    # This exposes the notification-service HTTP port.
