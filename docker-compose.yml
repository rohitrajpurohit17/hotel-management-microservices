      - hotel-network

# This section defines reusable Docker volumes.
volumes:
  # This stores PostgreSQL data persistently.
  postgres-data:
  # This stores RabbitMQ data persistently.
  rabbitmq-data:

# This section defines custom Docker networks used by the application.
networks:
  # This creates a dedicated bridge network for service-to-service communication.
  hotel-network:
    # This explicitly chooses the standard bridge network driver.
    driver: bridge
