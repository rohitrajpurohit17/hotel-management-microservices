    # These environment variables replace localhost settings with Docker service names.
    environment:
      # This tells payment-service where config-server is reachable inside Docker.
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      # This tells payment-service where Eureka is reachable inside Docker.
      EUREKA_SERVER_URL: http://service-discovery:8761/eureka
      # This points payment-service to its PostgreSQL database.
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/payment_db
      # This sets the PostgreSQL username for payment-service.
      PAYMENT_DB_USERNAME: hotel_admin
      # This sets the PostgreSQL password for payment-service.
      PAYMENT_DB_PASSWORD: hotel_admin
      # This selects the PostgreSQL JDBC driver instead of the H2 default.
      PAYMENT_DB_DRIVER: org.postgresql.Driver
      # This tells payment-service how to connect to RabbitMQ inside Docker.
