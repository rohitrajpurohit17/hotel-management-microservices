      # This tells payment-service which RabbitMQ port to use.
      RABBITMQ_PORT: 5672
      # This tells payment-service which RabbitMQ username to use.
      RABBITMQ_USERNAME: hotelmq
      # This tells payment-service which RabbitMQ password to use.
      RABBITMQ_PASSWORD: hotelmq123
    # This exposes the payment-service HTTP port.
    ports:
      # This maps host port 8083 to container port 8083.
      - "8083:8083"
    # This attaches the service to the shared application network.
    networks:
      # This uses the custom bridge network defined at the bottom of the file.
      - hotel-network

  # This service manages user-related data.
  user-service:
