      # This sets the PostgreSQL username for user-service.
      USER_DB_USERNAME: hotel_admin
      # This sets the PostgreSQL password for user-service.
      USER_DB_PASSWORD: hotel_admin
      # This selects the PostgreSQL JDBC driver instead of the H2 default.
