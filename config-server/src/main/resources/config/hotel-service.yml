server:
  port: 8081

spring:
  datasource:
    url: ${HOTEL_DB_URL:jdbc:h2:mem:hoteldb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${HOTEL_DB_USERNAME:sa}
    password: ${HOTEL_DB_PASSWORD:}
    driver-class-name: ${HOTEL_DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

