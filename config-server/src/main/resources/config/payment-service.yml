server:
  port: 8083

spring:
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:h2:mem:paymentdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${PAYMENT_DB_USERNAME:sa}
    password: ${PAYMENT_DB_PASSWORD:}
    driver-class-name: ${PAYMENT_DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

app:
  messaging:
    payment-exchange: payment.exchange
    payment-routing-key: payment.processed

