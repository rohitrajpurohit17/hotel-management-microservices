server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: hotel-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: hotel-services
          __path__: /var/log/hotel-services/*.log
    pipeline_stages:
      - match:
          selector: '{job="hotel-services"}'
          stages:
            - regex:
                expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3})\s+(?P<level>\w+)\s+\[(?P<service>[^\]]+)\]\s+(?P<traceId>[^,]+),\s+(?P<spanId>[^\]]+)\]\s+(?P<message>.+)$'
            - labels:
                level:
                service:
                traceId:
                spanId:
            - output:
                source: message

# This Promtail configuration collects logs from all hotel services.
# It parses the log format to extract service name, trace ID, span ID, and message.
# Logs are sent to Loki for centralized storage and querying.
